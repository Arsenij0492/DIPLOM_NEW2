<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Кабинет специалиста | Кубань Кредит</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <!-- Шапка -->
    <header class="header">
        <div class="container">
            <div class="header-content">
                <div class="logo">
                    <h2>Кубань Кредит</h2>
                    <span class="badge">Кредитный специалист</span>
                </div>
                
                <div class="header-right">
                    <div class="user-info">
                        <span class="user-name"></span>
                        <span class="user-role">Специалист</span>
                    </div>
                    <button class="btn btn-outline btn-sm logout-btn">
                        <span>🚪</span>
                        <span>Выход</span>
                    </button>
                </div>
            </div>
        </div>
    </header>
    
    <!-- Основной контент -->
    <main class="container">
        <!-- Статистика -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-value" id="total-applications">0</div>
                <div class="stat-label">Всего заявок</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="pending-applications">0</div>
                <div class="stat-label">На рассмотрении</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="approved-applications">0</div>
                <div class="stat-label">Одобрено</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="rejected-applications">0</div>
                <div class="stat-label">Отказано</div>
            </div>
        </div>
        
        <!-- Фильтры -->
        <div class="filters-bar">
            <div class="filter-group">
                <label>Статус:</label>
                <select id="status-filter" class="form-control" onchange="filterApplications()">
                    <option value="all">Все статусы</option>
                    <option value="submitted">На рассмотрении</option>
                    <option value="documents_check">Проверка документов</option>
                    <option value="approved">Одобренные</option>
                    <option value="rejected">Отказанные</option>
                    <option value="need_docs">Требуют документы</option>
                </select>
            </div>
            
            <div class="filter-group">
                <label>Поиск:</label>
                <input type="text" id="search-input" class="form-control" placeholder="Email или ФИО клиента" oninput="filterApplications()">
            </div>
            
            <div class="filter-group">
                <label>Сортировка:</label>
                <select id="sort-filter" class="form-control" onchange="filterApplications()">
                    <option value="newest">Сначала новые</option>
                    <option value="oldest">Сначала старые</option>
                </select>
            </div>
        </div>
        
        <!-- Список заявок -->
        <div class="applications-list">
            <h2>Все заявки на сельскую ипотеку</h2>
            <div id="applications-container">
                <div class="loading">Загрузка заявок...</div>
            </div>
        </div>
    </main>
    
    <!-- Модальное окно изменения статуса -->
    <div id="status-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Изменить статус заявки</h2>
                <span class="close" onclick="closeStatusModal()">&times;</span>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>Новый статус:</label>
                    <select id="new-status" class="form-control">
                        <option value="submitted">На рассмотрении</option>
                        <option value="documents_check">Проверка документов</option>
                        <option value="approved">Одобрить</option>
                        <option value="rejected">Отказать</option>
                        <option value="need_docs">Запросить документы</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label>Комментарий:</label>
                    <textarea id="status-comment" class="form-control" rows="3" placeholder="Причина изменения статуса..."></textarea>
                </div>
                
                <div class="document-request hidden" id="document-request">
                    <label class="form-label">Какие документы запросить:</label>
                    <div class="checkbox-group">
                        <label class="checkbox-label">
                            <input type="checkbox" value="passport"> Паспорт
                        </label>
                        <label class="checkbox-label">
                            <input type="checkbox" value="snils"> СНИЛС
                        </label>
                        <label class="checkbox-label">
                            <input type="checkbox" value="income"> Справка о доходах
                        </label>
                        <label class="checkbox-label">
                            <input type="checkbox" value="property"> Документы на недвижимость
                        </label>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeStatusModal()">Отмена</button>
                <button class="btn btn-primary" onclick="confirmStatusChange()">Сохранить</button>
            </div>
        </div>
    </div>
    
    <script src="js/config.js"></script>
    <script src="js/supabase-client.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/loader.js"></script>
    <script src="js/error-handler.js"></script>
    
    <!-- Баннер офлайн -->
    <div id="offline-banner" class="offline-banner" style="display: none;">
        ⚠️ Нет соединения с сервером. Данные могут быть неактуальны.
    </div>
    
    <script>
        let allApplications = [];
        let currentApplicationId = null;
        
        document.addEventListener('DOMContentLoaded', async function() {
            await Loader.withLoader(async () => {
                const userResult = await window.getCurrentUser();
                if (userResult.success && userResult.user) {
                    if (userResult.user.profile?.role !== 'expert') {
                        window.location.href = 'dashboard.html';
                    }
                    await loadAllApplications();
                }
            }, 'Загрузка данных...');
        });
        
        async function loadAllApplications() {
            const container = document.getElementById('applications-container');
            
            const result = await window.getAllApplications();
            
            if (result.success && result.applications) {
                allApplications = result.applications;
                updateStatistics();
                displayApplications(allApplications);
            } else {
                container.innerHTML = `
                    <div class="error-state">
                        <p>Ошибка при загрузке заявок</p>
                        <button onclick="loadAllApplications()" class="btn btn-primary">
                            Повторить
                        </button>
                    </div>
                `;
            }
        }
        
        function updateStatistics() {
            document.getElementById('total-applications').textContent = allApplications.length;
            document.getElementById('pending-applications').textContent = 
                allApplications.filter(app => app.status === 'submitted' || app.status === 'documents_check').length;
            document.getElementById('approved-applications').textContent = 
                allApplications.filter(app => app.status === 'approved').length;
            document.getElementById('rejected-applications').textContent = 
                allApplications.filter(app => app.status === 'rejected').length;
        }
        
        function formatCurrency(amount) {
            return new Intl.NumberFormat('ru-RU', {
                style: 'currency',
                currency: 'RUB',
                minimumFractionDigits: 0
            }).format(amount);
        }
        
        function displayApplications(applications) {
            const container = document.getElementById('applications-container');
            
            if (applications.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <p>Заявок не найдено</p>
                    </div>
                `;
                return;
            }
            
            let html = '<div class="applications-table">';
            html += `
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Клиент</th>
                            <th>Сумма</th>
                            <th>Срок</th>
                            <th>Статус</th>
                            <th>Дата</th>
                            <th>Действия</th>
                        </tr>
                    </thead>
                    <tbody>
            `;
            
            applications.forEach(app => {
                const clientName = app.users ? 
                    `${app.users.last_name} ${app.users.first_name}` : 
                    'Неизвестно';
                const status = window.APP_CONFIG?.applicationStatuses[app.status] || app.status;
                const statusClass = getStatusClass(app.status);
                
                html += `
                    <tr>
                        <td><span class="app-id">#${app.id.slice(0,8)}</span></td>
                        <td>
                            <strong>${clientName}</strong>
                            <br>
                            <small class="text-muted">${app.users?.email || ''}</small>
                        </td>
                        <td><strong>${formatCurrency(app.property_price)}</strong></td>
                        <td>${app.loan_term} лет</td>
                        <td><span class="status-badge ${statusClass}">${status}</span></td>
                        <td>${new Date(app.created_at).toLocaleDateString()}</td>
                        <td>
                            <div class="action-cell">
                                <button class="btn btn-secondary btn-sm" onclick="viewApplication('${app.id}')">
                                    👁️
                                </button>
                                <button class="btn btn-primary btn-sm" onclick="openStatusModal('${app.id}')">
                                    ✏️
                                </button>
                            </div>
                        </td>
                    </tr>
                `;
            });
            
            html += `
                    </tbody>
                </table>
            </div>`;
            
            container.innerHTML = html;
        }
        
        function filterApplications() {
            const statusFilter = document.getElementById('status-filter').value;
            const searchFilter = document.getElementById('search-input').value.toLowerCase();
            const sortFilter = document.getElementById('sort-filter').value;
            
            let filtered = [...allApplications];
            
            if (statusFilter !== 'all') {
                filtered = filtered.filter(app => app.status === statusFilter);
            }
            
            if (searchFilter) {
                filtered = filtered.filter(app => {
                    const client = app.users;
                    if (!client) return false;
                    
                    const fullName = `${client.last_name} ${client.first_name} ${client.middle_name || ''}`.toLowerCase();
                    const email = client.email?.toLowerCase() || '';
                    
                    return fullName.includes(searchFilter) || email.includes(searchFilter);
                });
            }
            
            filtered.sort((a, b) => {
                if (sortFilter === 'newest') {
                    return new Date(b.created_at) - new Date(a.created_at);
                } else {
                    return new Date(a.created_at) - new Date(b.created_at);
                }
            });
            
            displayApplications(filtered);
        }
        
        function openStatusModal(applicationId) {
            currentApplicationId = applicationId;
            const modal = document.getElementById('status-modal');
            modal.style.display = 'flex';
        }
        
        function closeStatusModal() {
            const modal = document.getElementById('status-modal');
            modal.style.display = 'none';
            currentApplicationId = null;
            
            document.getElementById('new-status').value = 'submitted';
            document.getElementById('status-comment').value = '';
            document.getElementById('document-request').classList.add('hidden');
        }
        
        document.addEventListener('DOMContentLoaded', function() {
            const statusSelect = document.getElementById('new-status');
            if (statusSelect) {
                statusSelect.addEventListener('change', function() {
                    const docRequest = document.getElementById('document-request');
                    if (this.value === 'need_docs') {
                        docRequest.classList.remove('hidden');
                    } else {
                        docRequest.classList.add('hidden');
                    }
                });
            }
        });
        
        async function confirmStatusChange() {
            if (!currentApplicationId) return;
            
            const newStatus = document.getElementById('new-status').value;
            const comment = document.getElementById('status-comment').value;
            
            await Loader.withLoader(async () => {
                const result = await window.updateApplicationStatus(currentApplicationId, newStatus, comment);
                
                if (result.success) {
                    closeStatusModal();
                    await loadAllApplications();
                    Loader.success('Статус обновлен!');
                } else {
                    throw new Error(result.error);
                }
            }, 'Обновление статуса...');
        }
        
        function viewApplication(applicationId) {
            window.location.href = `application-details.html?id=${applicationId}`;
        }
        
        function getStatusClass(status) {
            const classes = {
                draft: 'status-draft',
                submitted: 'status-submitted',
                documents_check: 'status-documents',
                approved: 'status-approved',
                rejected: 'status-rejected',
                need_docs: 'status-need-docs'
            };
            return classes[status] || 'status-default';
        }
        
        window.addEventListener('unhandledrejection', function(event) {
            console.error('Unhandled rejection:', event.reason);
            Loader.hide();
        });
    </script>
</body>
</html>
